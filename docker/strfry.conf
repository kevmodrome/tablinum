##
## Minimal strfry config for local Tablinum development
##

db = "./strfry-db/"

relay {
    # Bind to all interfaces (required for Docker)
    bind = "0.0.0.0"
    port = 7777

    info {
        name = "tablinum-dev-relay"
        description = "Local strfry relay for Tablinum development"
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}
